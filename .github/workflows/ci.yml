name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install project npm
        run: |
          npm_spec="$(node -p 'require("./package.json").packageManager')"
          cd /tmp
          npm install --global "$npm_spec"

      - run: npm ci
      - run: npm run check

  test:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install project npm
        run: |
          npm_spec="$(node -p 'require("./package.json").packageManager')"
          cd /tmp
          npm install --global "$npm_spec"

      - run: npm ci
      - run: npm run build
      - run: npm run test
