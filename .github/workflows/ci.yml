name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm 11
        run: |
          # Run outside the repo so the bundled npm 10 does not evaluate
          # devEngines before it upgrades itself to the project npm version.
          cd /tmp
          npm install --global --ignore-scripts npm@11.12.1
          npm --version

      - run: npm ci
      - run: npm run check

  test:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm 11
        run: |
          # Run outside the repo so the bundled npm 10 does not evaluate
          # devEngines before it upgrades itself to the project npm version.
          cd /tmp
          npm install --global --ignore-scripts npm@11.12.1
          npm --version

      - run: npm ci
      - run: npm run build
      - run: npm run test
